name: Epic
description: Cross-cutting initiative spanning multiple repos
labels: ["epic"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is this epic trying to achieve?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What repos and components are affected?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this epic is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, ADRs, or background that help explain the initiative.
    validations:
      required: false
